name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix frontend
      - run: npm run typecheck --prefix frontend
      - run: npm run test --prefix frontend

  python:
    name: Python (lint, type-check, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - working-directory: python
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy
      - working-directory: python
        run: ruff check .
      - working-directory: .
        run: pytest tests/python/ -v --tb=short

  rust:
    name: Rust (check, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - working-directory: src-tauri
        run: cargo check
      - working-directory: src-tauri
        run: cargo clippy -- -D warnings

  tauri-build:
    name: Tauri Build
    needs: [frontend, python, rust]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm ci --prefix frontend
      - uses: tauri-apps/tauri-action@v0
        with:
          tagName: app-v__VERSION__
          releaseName: 'OpenStudio AI v__VERSION__'
          releaseDraft: true
